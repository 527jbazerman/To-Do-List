<!doctype html>
<html lang="en">

<head>
    <title>Modern Task App</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <h2 class="title">Task Manager</h2>

        <p id="taskCounter">0 tasks</p>

        <!-- 🔍 SEARCH -->
        <label class="input-label">Search Tasks</label>
        <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search tasks...">

        <!-- 🏷️ CATEGORY FILTER -->
        <label class="input-label">Filter by Category</label>
        <select id="categoryFilter" class="form-select mb-3">
            <option value="All">All</option>
            <option value="School">School</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
        </select>

        <!-- ➕ ADD TASK -->
        <label class="input-label">Add New Task</label>
        <div class="row mb-3">
            <div class="col-7">
                <input type="text" id="taskInput" class="form-control" placeholder="Enter task...">
            </div>

            <div class="col-3">
                <select id="categorySelect" class="form-select">
                    <option value="School">School</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                </select>
            </div>

            <div class="col-2">
                <button id="addTaskBtn" class="btn btn-dark w-100">Add</button>
            </div>
        </div>

        <!-- LIST -->
        <ul id="taskList" class="list-group"></ul>

        <!-- CLEAR -->
        <button id="clearTaskBtn" class="btn btn-outline-danger w-100 mt-3">
            Clear All
        </button>

    </div>

    <script src="script.js"></script>
</body>

</html>
